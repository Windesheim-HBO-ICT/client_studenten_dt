<!doctype html>
<html lang="nl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="style.css">
  <script src="js/app.js"></script>
</head>

<body>

  

  <p>Hello world! This is HTML5 Boilerplate.</p>



  <div class="display" id="display">0</div>

  <div class="calculator">

    <div class="button">7</div>
    <div class="button">8</div>
    <div class="button">9</div>

    <div class="button">4</div>
    <div class="button">5</div>
    <div class="button">6</div>

    <div class="button">1</div>
    <div class="button">2</div>
    <div class="button">3</div>

    <div class="button zero">0</div>
  </div>

    <script>

    // debugger;

    // Javascript code om de knoppen van de calculator te laten werken
    const buttons = document.querySelectorAll(".calculator .button");

    function handleButtonClick(event) {
      debugger;
      const value = event.target.textContent;
      console.log("Clicked:", value);

      // showValue functie aan te roepen
    }

    buttons.forEach(
      // in dit geval is handleButtonClick een callback functie.
      button => {button.addEventListener("click", handleButtonClick);
    });

    // Functie om de waarde op het display te tonen
    function showValue(value) {
      const display = document.getElementById("display");
      display.textContent = value;
    }
  </script>

</body>

</html>

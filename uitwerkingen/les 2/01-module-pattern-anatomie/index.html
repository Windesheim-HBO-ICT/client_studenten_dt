      const melding = `Hallo ${naam}, wereld van module`;

    //////////////////////////////////////
    // Mollie module met skelet module
    //////////////////////////////////////
    const mollie = (() => {

      // configuratie
      config = {
        valuta : 'euro',
        saldo: 100
      }

      // private functies
      const betalingVerwerken = (bedrag) => {
        config.saldo = config.saldo - bedrag;
      }

      // publieke funties
      const betaal = (bedrag) => {
        betalingVerwerken(bedrag)
        console.log('Het saldo is nu ' + config.saldo);
      }

      // return object
      return {
        betaal: betaal
      }

    })()
